name: vidhi

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: vidhi-backend:local
    container_name: vidhi-backend
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: vidhi-frontend
    working_dir: /workspace
    command: sh -c "npm ci && npm --prefix frontend run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
